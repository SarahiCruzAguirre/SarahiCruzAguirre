name: Update Banner SVG

on:
  schedule:
    # Corre todos los días a las 6am hora Colombia (11am UTC)
    - cron: '0 11 * * *'
  push:
    branches: [main]
  workflow_dispatch: # permite correrlo manualmente desde Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate banner SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-banner.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/banner.svg
          git diff --staged --quiet || git commit -m "chore: update banner stats [skip ci]"
          git push
